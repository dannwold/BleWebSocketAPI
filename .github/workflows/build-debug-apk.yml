name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Make Gradle wrapper executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 4️⃣ Build Debug APK using the wrapper
      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      # 5️⃣ Prepare ZIP artifact
      - name: Zip Debug APK
        run: |
          mkdir -p build_artifact
          cp app/build/outputs/apk/debug/app-debug.apk build_artifact/
          cd build_artifact
          zip -r debug-apk.zip app-debug.apk

      # 6️⃣ Upload ZIP artifact for download
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-zip
          path: build_artifact/debug-apk.zip
