name: Build & Release BLE WebSocket API

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      - name: Create gradle.properties for AndroidX
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Fix AndroidManifest.xml
        run: |
          sed -i '/package="/d' app/src/main/AndroidManifest.xml
          sed -i '/<activity.*MainActivity/ s/>$/ android:exported="true">/' app/src/main/AndroidManifest.xml

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Zip project + APK
        run: zip -r BleWebSocketAPI.zip \
              app/build/outputs/apk/debug \
              app \
              src \
              build.gradle \
              settings.gradle \
              gradle.properties

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          name: BleWebSocketAPI.zip
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
